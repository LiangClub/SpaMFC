# Immune Cells Configuration
# Recommended: Enable expression features only (spatial optional)

celltype: "ILC"

data:
  output_dir: "./results/immune/"
  sample_col: "sample_id"
  celltype_col: "anno_cell2location_res"

# Feature fusion method: adaptive/fixed/concat
fusion_method: "adaptive"

features:
  spatial:
    use: false
    fixed_weight: 0.0
    
  cnv:
    use: false
    fixed_weight: 0.0
    
  expression:
    use: true
    pca_dim: 50
    pca_keep_dim: 30
    fixed_weight: 1.0
    
  niche:
    use: false
    fixed_weight: 0.0

nmf:
  n_runs: 10
  n_components: 5

clustering:
  method: "kmeans"
  n_clusters: 3
  per_sample: true

unification:
  enable: true
  marker_weight: 0.6
  pathway_weight: 0.4
  niche_weight: 0.0